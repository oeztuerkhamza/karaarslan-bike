name: Mailcow Get DKIM Key

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  get-dkim:
    runs-on: ubuntu-latest
    steps:
      - name: Get DKIM public key from mailcow
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 2m
          script: |
            set +e
            MAILCOW_DIR=""
            for d in /opt/mailcow-dockerized /opt/mailcow /root/mailcow-dockerized /root/mailcow ~/mailcow-dockerized ~/mailcow; do
              if [ -d "$d" ] && [ -f "$d/mailcow.conf" ]; then
                MAILCOW_DIR="$d"
                break
              fi
            done
            [ -z "$MAILCOW_DIR" ] && echo "ERROR: mailcow.conf bulunamadi" && exit 1
            cd "$MAILCOW_DIR"
            source mailcow.conf

            echo "=== DB'den DKIM kaydi ==="
            docker compose exec -T mysql-mailcow mysql \
              -u"$DBUSER" -p"$DBPASS" "$DBNAME" \
              -e "SELECT domain, dkim_selector FROM dkim WHERE domain='bikehausfreiburg.com';"

            echo ""
            echo "=== rspamd DKIM dosyalari ==="
            docker compose exec -T rspamd-mailcow ls -la /var/lib/rspamd/dkim/ 2>/dev/null || echo "(dizin yok)"

            echo ""
            echo "=== rspamd DKIM txt dosyasi ==="
            docker compose exec -T rspamd-mailcow sh -c "cat /var/lib/rspamd/dkim/bikehausfreiburg.com.*.txt 2>/dev/null || cat /var/lib/rspamd/dkim/*.txt 2>/dev/null || echo 'dosya bulunamadi'"
