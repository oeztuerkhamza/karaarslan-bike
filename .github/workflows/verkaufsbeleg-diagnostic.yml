name: Verkaufsbeleg Diagnostic
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 8m
          script: |
            set +e
            cd /opt/bikehaus

            command -v sqlite3 >/dev/null || (apt-get update -qq && apt-get install -y -qq sqlite3 >/dev/null 2>&1)
            docker cp bikehaus-app:/app/data/BikeHausFreiburg.db /tmp/diag.db
            DBQ() { sqlite3 -header -column /tmp/diag.db "$1"; }

            echo "=== A. Sales rows summary ==="
            DBQ "SELECT COUNT(*) AS sales_count FROM Sales;"
            DBQ "SELECT Id, BicycleId, BuyerId, PurchaseId, BelegNummer FROM Sales ORDER BY Id LIMIT 10;"
            echo ""

            echo "=== B. Purchases rows summary ==="
            DBQ "SELECT COUNT(*) AS purchases_count FROM Purchases;"
            DBQ "
              SELECT Id, BicycleId, SellerId, BelegNummer,
                     LENGTH(COALESCE(BelegNummer,'')) AS beleg_len,
                     LENGTH(COALESCE(AnzeigeNr,'')) AS anzeige_len,
                     LENGTH(COALESCE(Notizen,'')) AS notizen_len,
                     VerkaufspreisVorschlag IS NOT NULL AS has_vorschlag
              FROM Purchases ORDER BY Id;"
            echo ""

            echo "=== C. Purchase 1/2/3 bicycle + seller field LENGTHS ==="
            DBQ "
              SELECT p.Id AS pid,
                     LENGTH(COALESCE(b.Marke,'')) AS marke_len,
                     LENGTH(COALESCE(b.Modell,'')) AS modell_len,
                     LENGTH(COALESCE(b.Rahmennummer,'')) AS rahmennr_len,
                     LENGTH(COALESCE(b.Farbe,'')) AS farbe_len,
                     LENGTH(COALESCE(b.Rahmengroesse,'')) AS rgr_len,
                     LENGTH(COALESCE(b.Reifengroesse,'')) AS reifen_len,
                     LENGTH(COALESCE(b.Fahrradtyp,'')) AS typ_len,
                     LENGTH(COALESCE(c.Vorname,'')||' '||COALESCE(c.Nachname,'')) AS sellname_len,
                     LENGTH(COALESCE(c.Strasse,'')||' '||COALESCE(c.Hausnummer,'')||', '||COALESCE(c.PLZ,'')||' '||COALESCE(c.Stadt,'')) AS selladdr_len,
                     LENGTH(COALESCE(c.Email,'')) AS email_len,
                     LENGTH(COALESCE(c.Telefon,'')) AS tel_len
              FROM Purchases p
              LEFT JOIN Bicycles b ON b.Id=p.BicycleId
              LEFT JOIN Customers c ON c.Id=p.SellerId
              ORDER BY p.Id;"
            echo ""

            echo "=== D. Purchase 1 actual non-PII values ==="
            DBQ "SELECT Id, BelegNummer, AnzeigeNr, Notizen, VerkaufspreisVorschlag, Preis FROM Purchases WHERE Id=1;"
            DBQ "SELECT b.Marke, b.Modell, b.Rahmennummer, b.Farbe, b.Rahmengroesse, b.Reifengroesse, b.Fahrradtyp, b.Zustand FROM Purchases p JOIN Bicycles b ON b.Id=p.BicycleId WHERE p.Id=1;"
            echo ""

            echo "=== E. ShopSettings logo size and any super-long fields (lengths only) ==="
            DBQ "SELECT LENGTH(LogoBase64) AS logo_b64, LENGTH(InhaberSignatureBase64) AS sig_b64, LENGTH(ShopName) AS shop_n, LENGTH(Strasse||' '||Hausnummer) AS addr_l, LENGTH(PLZ||' '||Stadt) AS city_l, LENGTH(Telefon) AS tel_l, LENGTH(Email) AS email_l, LENGTH(Bankname) AS bank_l, LENGTH(IBAN) AS iban_l FROM ShopSettings LIMIT 1;"
            echo ""

            echo "=== F. Recent log timestamps near DocumentLayoutException ==="
            docker logs --tail 5000 --timestamps bikehaus-app 2>&1 | grep -E 'DocumentLayoutException' | tail -5
            echo ""

            echo "=== G. Probe Kaufbeleg with each existing Purchase id ==="
            # 401 means auth required; we just check that no 5xx leaks
            for pid in $(sqlite3 /tmp/diag.db "SELECT Id FROM Purchases ORDER BY Id LIMIT 5;"); do
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 8 "http://localhost:5000/api/purchases/${pid}/kaufbeleg")
              echo "  /api/purchases/${pid}/kaufbeleg -> ${code}"
            done
            echo ""

            rm -f /tmp/diag.db
            echo "=== DONE ==="
