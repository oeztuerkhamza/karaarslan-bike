name: Verkaufsbeleg Diagnostic
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 8m
          script: |
            set +e
            cd /opt/bikehaus

            echo "=== 1. Deployed commit ==="
            git rev-parse --short HEAD
            echo ""

            echo "=== 2. DB inside container (volume bikehaus-data) ==="
            docker exec bikehaus-app sh -c "ls -la /app/data/" 2>&1 | head -10
            DBQ() { docker exec bikehaus-app sh -c "sqlite3 -header -column /app/data/BikeHausFreiburg.db \"$1\"" 2>&1; }
            # ensure sqlite3 inside container; if not, fall back to copying out
            if ! docker exec bikehaus-app sh -c "command -v sqlite3 >/dev/null"; then
              echo "sqlite3 not in container — copying db out to host"
              docker cp bikehaus-app:/app/data/BikeHausFreiburg.db /tmp/diag.db
              command -v sqlite3 >/dev/null || (apt-get update -qq && apt-get install -y -qq sqlite3 >/dev/null 2>&1)
              DBQ() { sqlite3 -header -column /tmp/diag.db "$1" 2>&1; }
            fi
            sqlite3 --version 2>/dev/null || echo "host sqlite missing"
            echo ""

            echo "=== 3. ShopSettings (full values; this is public business info) ==="
            DBQ "SELECT ShopName, InhaberVorname, InhaberNachname, Strasse, Hausnummer, PLZ, Stadt, Telefon, Email, Bankname, IBAN, Steuernummer, UstIdNr, GoogleReviewUrl FROM ShopSettings LIMIT 1;"
            echo ""
            echo "--- LogoBase64 / SignatureBase64 lengths only ---"
            DBQ "SELECT LENGTH(COALESCE(LogoBase64,'')) AS logo_len, LENGTH(COALESCE(InhaberSignatureBase64,'')) AS sig_len FROM ShopSettings LIMIT 1;"
            echo ""

            echo "=== 4. Field LENGTHS for Sale 1 ==="
            DBQ "
              SELECT
                s.Id, s.BicycleId, s.BuyerId, s.PurchaseId,
                LENGTH(COALESCE(s.BelegNummer,'')) AS beleg_len,
                LENGTH(COALESCE(s.Notizen,'')) AS notes_len,
                LENGTH(COALESCE(b.Marke,'')) AS marke_len,
                LENGTH(COALESCE(b.Modell,'')) AS modell_len,
                LENGTH(COALESCE(b.Rahmennummer,'')) AS rahmennr_len,
                LENGTH(COALESCE(b.Farbe,'')) AS farbe_len,
                LENGTH(COALESCE(b.Rahmengroesse,'')) AS rgroesse_len,
                LENGTH(COALESCE(b.Reifengroesse,'')) AS reifen_len,
                LENGTH(COALESCE(b.Fahrradtyp,'')) AS typ_len,
                LENGTH(COALESCE(c.Vorname,'')||' '||COALESCE(c.Nachname,'')) AS fullname_len,
                LENGTH(COALESCE(c.Strasse,'')||' '||COALESCE(c.Hausnummer,'')) AS street_len,
                LENGTH(COALESCE(c.PLZ,'')||' '||COALESCE(c.Stadt,'')) AS city_len,
                LENGTH(COALESCE(c.Email,'')) AS email_len,
                LENGTH(COALESCE(c.Telefon,'')) AS tel_len
              FROM Sales s
              LEFT JOIN Bicycles b ON b.Id=s.BicycleId
              LEFT JOIN Customers c ON c.Id=s.BuyerId
              WHERE s.Id=1;"
            echo ""

            echo "=== 5. Sale 1 actual bicycle values (no buyer PII) ==="
            DBQ "
              SELECT b.Marke, b.Modell, b.Rahmennummer, b.Fahrradtyp, b.Farbe, b.Rahmengroesse, b.Reifengroesse, b.Zustand
              FROM Sales s JOIN Bicycles b ON b.Id=s.BicycleId WHERE s.Id=1;"
            echo ""
            echo "--- Sale 1 BelegNummer + Notizen length ---"
            DBQ "SELECT s.BelegNummer, LENGTH(s.Notizen) AS notizen_len FROM Sales s WHERE s.Id=1;"
            echo ""

            echo "=== 6. Top 10 longest Rahmennummer / Marke / Modell across DB ==="
            DBQ "SELECT Id, Marke, LENGTH(Marke) AS l FROM Bicycles ORDER BY l DESC LIMIT 5;"
            DBQ "SELECT Id, Modell, LENGTH(Modell) AS l FROM Bicycles ORDER BY l DESC LIMIT 5;"
            DBQ "SELECT Id, Rahmennummer, LENGTH(Rahmennummer) AS l FROM Bicycles ORDER BY l DESC LIMIT 5;"
            echo ""

            echo "=== 7. Last QuestPDF DocumentLayoutException context ==="
            docker logs --tail 5000 bikehaus-app 2>&1 | grep -B1 -A1 'DocumentLayoutException\|GenerateKaufbeleg\|GenerateVerkaufsbeleg' | tail -40
            echo ""

            echo "=== 8. Probe internal endpoints ==="
            curl -sS -o /dev/null -w "  /api/sales/1/verkaufsbeleg -> %{http_code}\n" --max-time 5 http://localhost:5000/api/sales/1/verkaufsbeleg
            curl -sS -o /dev/null -w "  /api/purchases/1/kaufbeleg -> %{http_code}\n" --max-time 5 http://localhost:5000/api/purchases/1/kaufbeleg
            echo ""

            rm -f /tmp/diag.db
            echo "=== DONE ==="
