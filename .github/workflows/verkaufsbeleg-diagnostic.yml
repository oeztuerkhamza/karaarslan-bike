name: Verkaufsbeleg Diagnostic

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect bikehaus-app on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set +e
            cd /opt/bikehaus

            echo "=== 1. Deployed commit on server ==="
            git rev-parse --short HEAD
            echo ""

            echo "=== 2. Container status ==="
            docker compose ps --format 'table {{.Name}}\t{{.Service}}\t{{.Status}}'
            echo ""

            echo "=== 3. bikehaus-app health & uptime ==="
            docker inspect --format '{{.State.Status}} | health={{if .State.Health}}{{.State.Health.Status}}{{else}}n/a{{end}} | started={{.State.StartedAt}}' bikehaus-app
            echo ""

            echo "=== 4. Last 30 lines of bikehaus-app log ==="
            docker logs --tail 30 bikehaus-app 2>&1 | sed -E 's/(Bearer|Authorization)[^"]*/\1<redacted>/g'
            echo ""

            echo "=== 5. Pattern hits in last 500 log lines (counts only) ==="
            LOG=$(docker logs --tail 500 bikehaus-app 2>&1)
            echo "verkaufsbeleg requests : $(echo "$LOG" | grep -ic verkaufsbeleg)"
            echo "kaufbeleg requests     : $(echo "$LOG" | grep -ic kaufbeleg)"
            echo "NullReferenceException : $(echo "$LOG" | grep -c NullReferenceException)"
            echo "InvalidOperationExc.   : $(echo "$LOG" | grep -c InvalidOperationException)"
            echo "KeyNotFoundException   : $(echo "$LOG" | grep -c KeyNotFoundException)"
            echo "HTTP 500 responses     : $(echo "$LOG" | grep -cE 'status.?code.?5[0-9]{2}|HTTP/[0-9.]+ 500|status: 500')"
            echo ""

            echo "=== 6. Most recent matching error lines (sanitized) ==="
            echo "$LOG" | grep -E 'NullReferenceException|InvalidOperationException|verkaufsbeleg|kaufbeleg' | tail -20 | sed -E 's/("?email"?|"?Email"?)[: =]"?[^",}]+/\1=<redacted>/gi; s/("?phone"?|"?Telefon"?)[: =]"?[^",}]+/\1=<redacted>/gi'
            echo ""

            echo "=== 7. Internal HTTP test (no auth) ==="
            echo "Expect 401 if app is up and Authorize filter intact:"
            curl -sS -o /dev/null -w "  /api/sales/1/verkaufsbeleg -> HTTP %{http_code} (size=%{size_download})\n" --max-time 5 http://localhost:5000/api/sales/1/verkaufsbeleg
            curl -sS -o /dev/null -w "  /api/sales (list)         -> HTTP %{http_code} (size=%{size_download})\n" --max-time 5 http://localhost:5000/api/sales
            curl -sS -o /dev/null -w "  /                         -> HTTP %{http_code} (size=%{size_download})\n" --max-time 5 http://localhost:5000/
            echo ""

            echo "=== 8. SQLite sanity: row counts for Sale 1 relations (no PII) ==="
            DB=/opt/bikehaus/data/BikeHausFreiburg.db
            if docker exec bikehaus-app sh -c "test -f /app/data/BikeHausFreiburg.db" 2>/dev/null; then
              docker exec bikehaus-app sh -c "command -v sqlite3 >/dev/null 2>&1 && echo present || echo missing" | head -1
              # Try via host if installed
              if command -v sqlite3 >/dev/null 2>&1; then
                echo "host sqlite3 available; running counts on copy"
                cp "$DB" /tmp/sale1.db 2>/dev/null && {
                  sqlite3 /tmp/sale1.db <<'SQL'
.headers on
.mode column
SELECT 'sale_exists' AS k, COUNT(*) AS v FROM Sales WHERE Id=1;
SELECT 'bicycle_id' AS k, COALESCE(BicycleId,-1) AS v FROM Sales WHERE Id=1;
SELECT 'buyer_id' AS k, COALESCE(BuyerId,-1) AS v FROM Sales WHERE Id=1;
SELECT 'beleg_empty' AS k, CASE WHEN BelegNummer IS NULL OR BelegNummer='' THEN 1 ELSE 0 END AS v FROM Sales WHERE Id=1;
SELECT 'bicycle_row_present' AS k, (SELECT COUNT(*) FROM Bicycles b JOIN Sales s ON s.BicycleId=b.Id WHERE s.Id=1) AS v;
SELECT 'buyer_row_present'   AS k, (SELECT COUNT(*) FROM Customers c JOIN Sales s ON s.BuyerId=c.Id WHERE s.Id=1) AS v;
SQL
                  rm -f /tmp/sale1.db
                }
              else
                echo "host sqlite3 not installed; skipping DB peek"
              fi
            else
              echo "DB file not visible inside container at expected path"
            fi
            echo ""

            echo "=== DONE ==="
