name: Verkaufsbeleg Diagnostic
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set +e
            cd /opt/bikehaus
            echo "=== 1. Deployed commit ==="
            git rev-parse --short HEAD
            echo ""
            echo "=== 2. Container status ==="
            docker compose ps
            echo ""
            echo "=== 3. bikehaus-app health ==="
            docker inspect --format '{{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}n/a{{end}} started={{.State.StartedAt}}' bikehaus-app
            echo ""
            echo "=== 4. Last 40 lines of bikehaus-app log ==="
            docker logs --tail 40 bikehaus-app 2>&1 | sed -E 's/(Bearer )[A-Za-z0-9._-]+/\1<redacted>/g'
            echo ""
            echo "=== 5. Pattern counts in last 500 log lines ==="
            LOG=$(docker logs --tail 500 bikehaus-app 2>&1)
            echo "verkaufsbeleg : $(printf %s "$LOG" | grep -ic verkaufsbeleg)"
            echo "kaufbeleg     : $(printf %s "$LOG" | grep -ic kaufbeleg)"
            echo "NRE           : $(printf %s "$LOG" | grep -c NullReferenceException)"
            echo "InvalidOpExc  : $(printf %s "$LOG" | grep -c InvalidOperationException)"
            echo "KeyNotFound   : $(printf %s "$LOG" | grep -c KeyNotFoundException)"
            echo ""
            echo "=== 6. Recent matching error lines ==="
            printf %s "$LOG" | grep -E 'NullReferenceException|InvalidOperationException|verkaufsbeleg|kaufbeleg' | tail -25
            echo ""
            echo "=== 7. Internal HTTP probes (no auth) ==="
            curl -sS -o /dev/null -w "  /api/sales/1/verkaufsbeleg -> %{http_code}\n" --max-time 5 http://localhost:5000/api/sales/1/verkaufsbeleg
            curl -sS -o /dev/null -w "  /api/sales (list)         -> %{http_code}\n" --max-time 5 http://localhost:5000/api/sales
            echo ""
            echo "=== DONE ==="
