name: Mailcow DB Inspect

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect rspamd DKIM volumes
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 3m
          script: |
            set +e
            MAILCOW_DIR=""
            for d in /opt/mailcow-dockerized /opt/mailcow /root/mailcow-dockerized /root/mailcow ~/mailcow-dockerized ~/mailcow; do
              if [ -d "$d" ] && [ -f "$d/mailcow.conf" ]; then
                MAILCOW_DIR="$d"
                break
              fi
            done
            cd "$MAILCOW_DIR"
            source mailcow.conf

            echo "=== rspamd-mailcow volume/mount bilgisi ==="
            docker inspect rspamd-mailcow 2>/dev/null | python3 -c "
import json,sys
d=json.load(sys.stdin)[0]
mounts=d.get('Mounts',[])
for m in mounts:
    print(m.get('Source',''),'->',m.get('Destination',''))
" || docker inspect rspamd-mailcow --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{println}}{{end}}' 2>/dev/null

            echo ""
            echo "=== rspamd icindeki DKIM dizinleri ==="
            docker compose exec -T rspamd-mailcow find / -name "*.key" -o -name "*.txt" 2>/dev/null | grep -i dkim | head -20
            docker compose exec -T rspamd-mailcow find /var/lib/rspamd -type d 2>/dev/null | head -10

            echo ""
            echo "=== Host uzerinde rspamd dkim ==="
            find /var/lib/docker/volumes -path "*rspamd*dkim*" 2>/dev/null | head -10
            find /opt -name "*.key" 2>/dev/null | grep -i dkim | head -10