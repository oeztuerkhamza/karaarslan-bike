worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream
    upstream karaaslan_api {
        server karaaslan:5000;
    }

    upstream karaaslan_client {
        server client:80;
    }

    upstream homepage_ssr {
        server homepage:4000;
    }

    # SSL settings (shared)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ═══════════════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECTS
    # ═══════════════════════════════════════════════════════════════

    # Redirect all HTTP to HTTPS (except Let's Encrypt challenge)
    server {
        listen 80;
        server_name [DOMAIN] www.[DOMAIN] admin.[DOMAIN] api.[DOMAIN] mail.[DOMAIN];

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/lib/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: www → non-www REDIRECT (duplicate content fix)
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name www.[DOMAIN];

        ssl_certificate /etc/letsencrypt/live/[DOMAIN]/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/[DOMAIN]/privkey.pem;

        return 301 https://[DOMAIN]$request_uri;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: PUBLIC HOMEPAGE ([DOMAIN]) — SSR
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name [DOMAIN];

        ssl_certificate /etc/letsencrypt/live/[DOMAIN]/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/[DOMAIN]/privkey.pem;

        # Serve static assets directly from nginx (fast, cached)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|webmanifest)$ {
            root /usr/share/nginx/html/homepage/browser;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Serve sitemap, robots.txt, llms.txt directly
        location = /sitemap.xml {
            root /usr/share/nginx/html/homepage/browser;
            add_header Content-Type "application/xml; charset=utf-8";
        }
        location = /robots.txt {
            root /usr/share/nginx/html/homepage/browser;
            add_header Content-Type "text/plain; charset=utf-8";
        }
        location = /llms.txt {
            root /usr/share/nginx/html/homepage/browser;
            add_header Content-Type "text/plain; charset=utf-8";
        }
        location = /llms-full.txt {
            root /usr/share/nginx/html/homepage/browser;
            add_header Content-Type "text/plain; charset=utf-8";
        }
        # IndexNow key verification
        location = /b7e4c8a1d3f54e89a2c6b0d7f1e3a5c9.txt {
            root /usr/share/nginx/html/homepage/browser;
            add_header Content-Type "text/plain; charset=utf-8";
        }

        # Dynamic product sitemap — proxy to API (serves from main domain for Google)
        location = /sitemap-products.xml {
            proxy_pass http://karaaslan_api/api/public/sitemap-products.xml;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Content-Type "application/xml; charset=utf-8";
            proxy_cache_valid 200 1h;
        }

        # All other routes → SSR (Node.js server)
        location / {
            proxy_pass http://homepage_ssr;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: ADMIN PANEL (admin.[DOMAIN])
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name admin.[DOMAIN];

        ssl_certificate /etc/letsencrypt/live/[DOMAIN]/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/[DOMAIN]/privkey.pem;

        # API reverse proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://karaaslan_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        # Angular Admin SPA — served by dedicated client container
        location / {
            proxy_pass http://karaaslan_client;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: API (api.[DOMAIN])
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name api.[DOMAIN];

        ssl_certificate /etc/letsencrypt/live/[DOMAIN]/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/[DOMAIN]/privkey.pem;

        # All API requests
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://karaaslan_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }

        # CORS is handled by the .NET API middleware — do NOT add duplicate headers here
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS: MAIL HOST (mail.[DOMAIN]) — Mailcow webmail
    # Reverse-proxy snippet adapted from mailcow docs to avoid the
    # ERR_TOO_MANY_REDIRECTS loop: Mailcow's internal nginx redirects
    # HTTP→HTTPS unless it sees X-Forwarded-Proto=https AND we leave
    # its Location headers untouched (proxy_redirect off).
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name mail.[DOMAIN];

        ssl_certificate /etc/letsencrypt/live/[DOMAIN]/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/[DOMAIN]/privkey.pem;

        # Allow large mail attachments (uploads via SOGo / Mailcow UI)
        client_max_body_size 0;

        location / {
            # Mailcow's HTTP port (8081) unconditionally redirects to HTTPS
            # regardless of X-Forwarded-Proto. Connect directly to its HTTPS
            # port (8444) to bypass the redirect entirely.
            proxy_pass https://host.docker.internal:8444;
            proxy_ssl_verify off;
            proxy_http_version 1.1;

            proxy_redirect off;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;

            proxy_read_timeout 3600s;
            proxy_connect_timeout 30s;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # FALLBACK: Catch-all for IP/unknown hosts
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/lib/letsencrypt;
        }

        location / {
            return 301 https://[DOMAIN]$request_uri;
        }
    }
}

