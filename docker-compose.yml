services:
  karaaslan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: karaaslan-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    volumes:
      - karaaslan-data:/app/data
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_SECRET_KEY}
      - IndexNow__ApiKey=${INDEXNOW_API_KEY}
      - GooglePlaces__ApiKey=${GOOGLE_PLACES_API_KEY}
      - GooglePlaces__PlaceId=${GOOGLE_PLACES_PLACE_ID}
      - PLAYWRIGHT_BROWSERS_PATH=/app/.playwright
      - Smtp__Host=${SMTP_HOST:-[SMTP_HOST]}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-no-reply@karaarslan-bike.de}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__UseSsl=${SMTP_USESSL:-false}
      - Smtp__FromEmail=${SMTP_FROMEMAIL:-no-reply@karaarslan-bike.de}
      - Smtp__FromName=${SMTP_FROMNAME:-Karaarslan Bike}
    networks:
      - karaaslan-network

  client:
    build:
      context: ./BikeHaus.Client
      dockerfile: Dockerfile
    container_name: karaaslan-client
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - karaaslan-network

  homepage:
    build:
      context: ./BikeHaus.Homepage
      dockerfile: Dockerfile
    container_name: karaaslan-homepage
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
    networks:
      - karaaslan-network

  nginx:
    image: nginx:alpine
    container_name: karaaslan-nginx
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - ./homepage-dist:/usr/share/nginx/html/homepage:ro
    depends_on:
      - karaaslan
      - client
      - homepage
    networks:
      - karaaslan-network

  # Certbot for Let's Encrypt SSL
  certbot:
    image: certbot/certbot
    container_name: karaaslan-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  karaaslan-data:
    driver: local
  certbot-etc:
    driver: local
  certbot-var:
    driver: local

networks:
  karaaslan-network:
    driver: bridge
